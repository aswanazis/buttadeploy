<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Yayasan ButtaPorea</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5faf0; padding: 2rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: white; border-radius: 28px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    h1, h2 { color: #1e4a2f; margin-bottom: 1rem; }
    .btn { background: #2b7a3e; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 40px; cursor: pointer; margin-right: 0.5rem; font-family: 'Inter', sans-serif; }
    .btn-danger { background: #d9534f; }
    .btn-warning { background: #f0ad4e; }
    input, textarea { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border-radius: 20px; border: 1px solid #ddd; font-family: 'Inter', sans-serif; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #e0e7e1; }
    .login-form { max-width: 400px; margin: 100px auto; }
    .nav-admin { margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .nav-admin a { text-decoration: none; color: #2b7a3e; font-weight: 500; }
    .nav-admin .right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
    .gambar-preview { max-width: 80px; border-radius: 12px; }

    /* Tombol bahasa admin */
    #langToggleBtn {
      background: #e8f5e9;
      color: #2b7a3e;
      border: 1.5px solid #2b7a3e;
      border-radius: 40px;
      padding: 0.3rem 0.9rem;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    #langToggleBtn:hover { background: #2b7a3e; color: white; }
  </style>
</head>
<body>
<div class="container" id="app">

  <!-- Login Section -->
  <div id="loginSection" style="display: block;">
    <div class="card login-form">
      <h2 data-i18n="admin_login_title">Login Admin</h2>
      <input type="text" id="username" data-i18n-placeholder="admin_username" placeholder="Username" autocomplete="off">
      <input type="password" id="password" data-i18n-placeholder="admin_password" placeholder="Password">
      <button class="btn" id="loginBtn" data-i18n="admin_login_btn">Login</button>
      <p id="loginError" style="color:red; margin-top:1rem;"></p>
    </div>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboardSection" style="display: none;">
    <div class="nav-admin">
      <a href="#" id="menuBerita" data-i18n="admin_menu_news">📰 Kelola Berita</a>
      <a href="#" id="menuKontak" data-i18n="admin_menu_contact">📩 Pesan Kontak</a>
      <a href="#" id="menuVideo" data-i18n="admin_menu_video">🎬 Kelola Video</a>
      <div class="right">
        <button id="langToggleBtn" onclick="toggleLang()">🌐 EN</button>
        <a href="/admin/logout" data-i18n="admin_logout">🚪 Logout</a>
      </div>
    </div>

    <!-- Form Tambah/Edit Berita -->
    <div id="beritaFormPanel" class="card" style="margin-bottom:2rem;">
      <h3 id="formTitle" data-i18n="admin_add_news">Tambah Berita Baru</h3>
      <input type="hidden" id="editId">
      <input type="text" id="judul" data-i18n-placeholder="admin_news_title" placeholder="Judul Berita">
      <input type="text" id="tanggal" data-i18n-placeholder="admin_news_date" placeholder="Tanggal (YYYY-MM-DD)">
      <textarea id="deskripsi" rows="2" data-i18n-placeholder="admin_news_desc" placeholder="Deskripsi singkat"></textarea>
      <textarea id="konten" rows="4" data-i18n-placeholder="admin_news_content" placeholder="Konten lengkap"></textarea>
      <input type="file" id="gambar" accept="image/*">
      <div>
        <button class="btn" id="simpanBeritaBtn" data-i18n="admin_save">Simpan</button>
        <button class="btn btn-warning" id="batalEditBtn" style="display:none;" data-i18n="admin_cancel">Batal</button>
      </div>
    </div>

    <!-- Daftar Berita -->
    <div class="card">
      <h3 data-i18n="admin_news_list">Daftar Berita</h3>
      <div id="beritaList"></div>
    </div>

    <!-- Daftar Pesan Kontak -->
    <div class="card" id="kontakPanel" style="display:none;">
      <h3 data-i18n="admin_contact_title">Pesan dari Pengunjung</h3>
      <div id="kontakList"></div>
    </div>

    <!-- Panel Video -->
    <div class="card" id="videoPanel" style="display:none;">
      <h3 data-i18n="admin_add_video">Tambah Video YouTube</h3>
      <input type="text" id="videoJudul" data-i18n-placeholder="admin_video_title" placeholder="Judul Video">
      <input type="text" id="videoUrl" data-i18n-placeholder="admin_video_url" placeholder="URL YouTube">
      <textarea id="videoDeskripsi" rows="2" data-i18n-placeholder="admin_video_desc" placeholder="Deskripsi singkat (opsional)"></textarea>
      <button class="btn" id="simpanVideoBtn" data-i18n="admin_save">Simpan</button>

      <hr style="margin: 1.5rem 0; border-color: #e0e7e1;">
      <h3 data-i18n="admin_video_list">Daftar Video</h3>
      <div id="videoList"></div>
    </div>
  </div>
</div>

<script src="i18n.js"></script>
<script>
  let currentEditId = null;

  function showLogin() {
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('dashboardSection').style.display = 'none';
  }

  function showDashboard() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboardSection').style.display = 'block';
  }

  async function apiFetch(url, options = {}) {
    const res = await fetch(url, { ...options, credentials: 'include' });
    if (res.status === 401) {
      showLogin();
      return null;
    }
    return res;
  }

  async function checkSession() {
    const res = await fetch('/admin/check', { credentials: 'include' });
    if (res.ok) {
      showDashboard();
      loadBeritaAdmin();
    } else {
      showLogin();
    }
  }

  checkSession();

  // Login
  document.getElementById('loginBtn')?.addEventListener('click', async () => {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      showDashboard();
      loadBeritaAdmin();
    } else {
      document.getElementById('loginError').innerText = data.error || 'Login gagal';
    }
  });

  // Load berita untuk admin
  async function loadBeritaAdmin() {
    const res = await apiFetch('/api/berita');
    if (!res) return;
    const berita = await res.json();
    if (berita.length === 0) {
      document.getElementById('beritaList').innerHTML = `<p>${t('admin_no_news')}</p>`;
      return;
    }
    const html = `<table>
      <thead><tr>
        <th>${t('admin_col_id')}</th>
        <th>${t('admin_col_image')}</th>
        <th>${t('admin_col_title')}</th>
        <th>${t('admin_col_date')}</th>
        <th>${t('admin_col_action')}</th>
      </tr></thead>
      <tbody>
        ${berita.map(b => `
          <tr>
            <td>${b.id}</td>
            <td>${b.gambar ? `<img class="gambar-preview" src="${b.gambar}">` : '-'}</td>
            <td>${b.judul}</td>
            <td>${b.tanggal || '-'}</td>
            <td>
              <button class="btn btn-warning" onclick="editBerita(${b.id})">${t('admin_edit_btn')}</button>
              <button class="btn btn-danger" onclick="hapusBerita(${b.id})">${t('admin_delete_btn')}</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
    document.getElementById('beritaList').innerHTML = html;
  }

  window.editBerita = async (id) => {
    const res = await apiFetch(`/api/berita/${id}`);
    if (!res) return;
    const b = await res.json();
    document.getElementById('editId').value = b.id;
    document.getElementById('judul').value = b.judul;
    document.getElementById('tanggal').value = b.tanggal || '';
    document.getElementById('deskripsi').value = b.deskripsiSingkat || '';
    document.getElementById('konten').value = b.kontenLengkap || '';
    document.getElementById('formTitle').innerText = t('admin_edit_news');
    document.getElementById('batalEditBtn').style.display = 'inline-block';
    currentEditId = b.id;
  };

  window.hapusBerita = async (id) => {
    if (!confirm(t('admin_confirm_delete'))) return;
    const res = await apiFetch(`/admin/berita/${id}`, { method: 'DELETE' });
    if (res && res.ok) {
      alert(t('admin_deleted'));
      loadBeritaAdmin();
    } else {
      alert(t('admin_delete_error'));
    }
  };

  document.getElementById('simpanBeritaBtn')?.addEventListener('click', async () => {
    const id = document.getElementById('editId').value;
    const judul = document.getElementById('judul').value;
    const tanggal = document.getElementById('tanggal').value;
    const deskripsi = document.getElementById('deskripsi').value;
    const konten = document.getElementById('konten').value;
    const fileInput = document.getElementById('gambar');
    const formData = new FormData();
    formData.append('judul', judul);
    formData.append('tanggal', tanggal);
    formData.append('deskripsiSingkat', deskripsi);
    formData.append('kontenLengkap', konten);
    if (fileInput.files[0]) formData.append('gambar', fileInput.files[0]);
    if (id) formData.append('gambar_lama', document.getElementById('gambar_lama')?.value || '');

    const url = id ? `/admin/berita/${id}` : '/admin/berita';
    const method = id ? 'PUT' : 'POST';
    const res = await apiFetch(url, { method, body: formData });
    if (res && res.ok) {
      alert(id ? t('admin_updated') : t('admin_saved'));
      resetForm();
      loadBeritaAdmin();
    } else {
      alert(t('admin_save_error'));
    }
  });

  document.getElementById('batalEditBtn')?.addEventListener('click', resetForm);

  function resetForm() {
    document.getElementById('editId').value = '';
    document.getElementById('judul').value = '';
    document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];
    document.getElementById('deskripsi').value = '';
    document.getElementById('konten').value = '';
    document.getElementById('gambar').value = '';
    document.getElementById('formTitle').innerText = t('admin_add_news');
    document.getElementById('batalEditBtn').style.display = 'none';
    currentEditId = null;
  }

  document.getElementById('menuKontak')?.addEventListener('click', async () => {
    document.getElementById('beritaFormPanel').style.display = 'none';
    document.getElementById('kontakPanel').style.display = 'block';
    document.getElementById('videoPanel').style.display = 'none';
    const res = await apiFetch('/admin/kontak');
    if (!res) return;
    const pesan = await res.json();
    const html = `<table>
      <thead><tr>
        <th>${t('admin_col_name')}</th>
        <th>${t('admin_col_email')}</th>
        <th>${t('admin_col_message')}</th>
        <th>${t('admin_col_date')}</th>
      </tr></thead>
      <tbody>
        ${pesan.map(p => `<tr>
          <td>${p.nama}</td>
          <td>${p.email}</td>
          <td>${p.pesan}</td>
          <td>${new Date(p.created_at).toLocaleString()}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
    document.getElementById('kontakList').innerHTML = html;
  });

  document.getElementById('menuBerita')?.addEventListener('click', () => {
    document.getElementById('beritaFormPanel').style.display = 'block';
    document.getElementById('kontakPanel').style.display = 'none';
    document.getElementById('videoPanel').style.display = 'none';
    loadBeritaAdmin();
  });

  // ===== VIDEO =====
  document.getElementById('menuVideo')?.addEventListener('click', () => {
    document.getElementById('beritaFormPanel').style.display = 'none';
    document.getElementById('kontakPanel').style.display = 'none';
    document.getElementById('videoPanel').style.display = 'block';
    loadVideoAdmin();
  });

  async function loadVideoAdmin() {
    const res = await apiFetch('/api/video');
    if (!res) return;
    const videos = await res.json();
    if (videos.length === 0) {
      document.getElementById('videoList').innerHTML = `<p>${t('video_empty')}</p>`;
      return;
    }
    const html = `<table>
      <thead><tr>
        <th>ID</th><th>Preview</th><th>${t('admin_col_title')}</th><th>${t('admin_col_action')}</th>
      </tr></thead>
      <tbody>
        ${videos.map(v => `<tr>
          <td>${v.id}</td>
          <td><img src="https://img.youtube.com/vi/${v.video_id}/mqdefault.jpg" style="width:120px;border-radius:8px;"></td>
          <td>${v.judul}</td>
          <td><button class="btn btn-danger" onclick="hapusVideo(${v.id})">${t('admin_delete_btn')}</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
    document.getElementById('videoList').innerHTML = html;
  }

  document.getElementById('simpanVideoBtn')?.addEventListener('click', async () => {
    const judul = document.getElementById('videoJudul').value.trim();
    const url_youtube = document.getElementById('videoUrl').value.trim();
    const deskripsi = document.getElementById('videoDeskripsi').value.trim();
    if (!judul || !url_youtube) return alert('Judul dan URL wajib diisi');
    const res = await apiFetch('/admin/video', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ judul, url_youtube, deskripsi })
    });
    if (res && res.ok) {
      alert(t('admin_video_added'));
      document.getElementById('videoJudul').value = '';
      document.getElementById('videoUrl').value = '';
      document.getElementById('videoDeskripsi').value = '';
      loadVideoAdmin();
    } else {
      const data = await res?.json();
      alert(data?.error || t('admin_save_error'));
    }
  });

  window.hapusVideo = async (id) => {
    if (!confirm(t('admin_confirm_delete_video'))) return;
    const res = await apiFetch(`/admin/video/${id}`, { method: 'DELETE' });
    if (res && res.ok) {
      alert(t('admin_video_deleted'));
      loadVideoAdmin();
    }
  };
</script>
</body>
</html>
